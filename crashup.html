<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrashUp Free 100% | GameHub</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

    <div class="loader" id="pageLoader">
        <div class="loader-box">GameHub</div>
    </div>

    <div class="lang-loader" id="langLoader">
        <div class="lang-box">
            <i class='bx bx-loader-alt bx-spin'></i>
            <p id="langLoaderText">جاري تغيير اللغة</p>
        </div>
    </div>

    <header class="header reveal">
        <div class="logo"><a href="/">GameHub</a></div>

        <div class="language-box">
            <select id="langSelect" class="lang-select">
                <option value="ar">AR</option>
                <option value="en">EN</option>
            </select>
            <i class='bx bx-chevron-down'></i>
        </div>
    </header>


    <!-- التصميم هنا -->



    <footer class="footer reveal">
        <div class="social">
            <a href="#"><i class='bx bxl-telegram'></i></a>
            <a href="#"><i class='bx bxl-youtube'></i></a>
            <a href="#"><i class='bx bxl-tiktok'></i></a>
        </div>
        <p data-key="footer">© 2026 GameHub. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="js/main.js"></script>

</body>

</html>
