    <script>
        const video = document.getElementById("mainVideo");
        const videoStart = document.getElementById("videoStart");
        const playBtn = document.getElementById("playBtn");
        const muteBtn = document.getElementById("muteBtn");
        const fullscreenBtn = document.getElementById("fullscreenBtn");
        const videoProgress = document.getElementById("videoProgress");
        const progressCurrent = document.getElementById("progressCurrent");
        const progressLoaded = document.getElementById("progressLoaded");
        const videoTime = document.getElementById("videoTime");

        function formatTime(time) {
            if (!time || isNaN(time)) return "00:00";

            const minutes = Math.floor(time / 60);
            const seconds = Math.floor(time % 60);

            return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
        }

        function updatePlayIcon() {
            if (video.paused) {
                playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                videoStart.classList.remove("hidden");
            } else {
                playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                videoStart.classList.add("hidden");
            }
        }

        function playVideo() {
            video.play();
            updatePlayIcon();
        }

        function pauseVideo() {
            video.pause();
            updatePlayIcon();
        }

        videoStart.addEventListener("click", playVideo);

        playBtn.addEventListener("click", function () {
            if (video.paused) {
                playVideo();
            } else {
                pauseVideo();
            }
        });

        video.addEventListener("click", function () {
            if (video.paused) {
                playVideo();
            } else {
                pauseVideo();
            }
        });

        video.addEventListener("play", updatePlayIcon);
        video.addEventListener("pause", updatePlayIcon);

        video.addEventListener("timeupdate", function () {
            const percent = (video.currentTime / video.duration) * 100;
            progressCurrent.style.width = `${percent}%`;
            videoTime.textContent = formatTime(video.currentTime);
        });

        video.addEventListener("progress", function () {
            if (video.buffered.length > 0 && video.duration) {
                const loaded = (video.buffered.end(video.buffered.length - 1) / video.duration) * 100;
                progressLoaded.style.width = `${loaded}%`;
            }
        });

        video.addEventListener("ended", function () {
            video.currentTime = 0;
            progressCurrent.style.width = "0%";
            videoTime.textContent = "00:00";
            updatePlayIcon();
        });

        videoProgress.addEventListener("click", function (e) {
            const rect = videoProgress.getBoundingClientRect();
            const clickPosition = e.clientX - rect.left;
            const percent = clickPosition / rect.width;

            video.currentTime = percent * video.duration;
        });

        muteBtn.addEventListener("click", function () {
            video.muted = !video.muted;

            muteBtn.innerHTML = video.muted
                ? '<i class="fa-solid fa-volume-xmark"></i>'
                : '<i class="fa-solid fa-volume-high"></i>';
        });

        fullscreenBtn.addEventListener("click", async function () {
            try {
                /*
                    iPhone / iPad Safari:
                    لازم نستخدم webkitEnterFullscreen على عنصر الفيديو نفسه
                */
                if (video.webkitEnterFullscreen) {
                    video.webkitEnterFullscreen();
                    return;
                }

                /*
                    Android Chrome / أغلب المتصفحات:
                    الأفضل نعمل fullscreen للفيديو نفسه
                */
                if (video.requestFullscreen) {
                    await video.requestFullscreen();
                    return;
                }

                if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen();
                    return;
                }

                if (video.msRequestFullscreen) {
                    video.msRequestFullscreen();
                    return;
                }

                /*
                    fallback لو المتصفح رفض الفيديو نفسه
                */
                const videoBox = document.querySelector(".video-shell");

                if (videoBox.requestFullscreen) {
                    await videoBox.requestFullscreen();
                } else if (videoBox.webkitRequestFullscreen) {
                    videoBox.webkitRequestFullscreen();
                }

            } catch (error) {
                console.log("Fullscreen not supported:", error);
            }
        });

        document.addEventListener("keydown", function (e) {
            if ((e.ctrlKey && e.key.toLowerCase() === "s") || (e.ctrlKey && e.key.toLowerCase() === "u")) {
                e.preventDefault();
            }
        });
    </script>

</body>

</html>
