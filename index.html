<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameHub | Choose Language</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body class="gateway-body">

    <main class="language-gate">
        <div class="matrix-bg"></div>

        <section class="language-panel">
            <div class="terminal-label">ACCESS_GATEWAY / LANGUAGE_REQUIRED</div>

            <div class="vault-logo">
                <span>GH</span>
            </div>

            <h1>GameHub</h1>
            <p>اختر لغة الموقع للمتابعة</p>
            <small>Choose your preferred interface language</small>

            <div class="language-actions">
                <a href="ar/" class="primary-action">العربية</a>
                <a href="en/" class="ghost-action">English</a>
            </div>

            <div class="gate-footer">
                <span>SECURE SESSION</span>
                <span>ODDS MONITOR</span>
                <span>APK TOOLS</span>
            </div>
        </section>
    </main>

</body>

</html>
